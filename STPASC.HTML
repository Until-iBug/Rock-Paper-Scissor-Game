<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STPASC.css">
    <title>Game</title>
</head>
<body>
    <h1>Stone Paper Scissor</h1>
    <div class="iconbox">
    <div class="icon" id="stone"  style="background-image: url('stone.png')"></div>
    <div class="icon" id="paper" style="background-image: url('paper.png')"></div>
    <div class="icon" id="scissor" style="background-image: url('scissor.png')"></div>
    </div>
    <div class="score">
        <div class="usc">
             <p class="ynum">0</p>
            <div>You</div>
        </div>
        <div class="csc">
            <p class="cnum">0</p>
            <div>Comp</div>
        </div>
    </div>
    <div class="msgboard">
        <div class="msg" style="color:#E0B1CB">Play and Slay</div>
    </div>
    <div class="compch msgboard" style="margin-top: 15px;">
        <div class="cc msg" style="color: #E0B1CB; ">Comp choice</div>
    </div>
    <div class="display">
        <div class="dis" ></div>
    </div>

</body>
<script src="STPASC.js"> </script>
</html>
